- question: "How do I join a CoreCollective working group?"
  answer: |
    Working groups are coordinated via Google Groups mailing lists.
    The Google Working Group can be joined by visiting the <a
    href="/working-groups/">Working Groups</a> page, clicking on the group
    title, then click "ask to join." This method requires a user be logged into
    a google account.  <br /><br />
    A group can also be joined by emailing [group-name]+subscribe@corecollective.dev where the group-name is found in the url of the Google Working Group page. NOTE: A confirm email is sent to the originator from Google. This often ends up in spam, so after sending, please check your spam to process the confirm. Once that's completed, the user must respond to that email, and the request will be sent on to the admin for final approval. <br /><br />
    At a future date each Working Group will have a team page which includes the group calendar and a place to store files. Until then, all WG information will be shared via the Google Group. <br /><br />
    If you have any issues, please email <b>community-mgrs@corecollective.dev</b> and one of us will add you manually.
  category: "Working Group FAQs"

- question: "What CoreCollective groups are available to join?"
  answer: >
    The <a href="/working-groups/">Working Groups</a> page lists all the
    active working groups.
    Click on the group title to get to the Google Group page where you can
    request to join and see the archives.
  category: "Working Group FAQs"

- question: "Can I join via email instead of the Google Groups page?"
  answer: >
    Yes, send an empty email to [group-name]+subscribe@corecollective.dev where
    the group-name is found on the Working Group --> About page of the
    associated Google Working Group.  
  category: "Mailing List FAQs"

- question: "Are working group archives public?"
  answer: >
    Yes, working groups keep public archives of the mailing list traffic.
    You don't need to be a member of a group to read the archive.
    You can see the mailing list archive by clicking on the group name
    on the <a href="/working-groups/">Working Groups</a> page.
  category: "Mailing List FAQs"

- question: "How do I propose a new CoreCollective Working Group or WG Initiative?"
  answer: |
    CoreCollective is always open to the proposal of new Working Groups or new Initiatives within a Working Group. New Working Groups must be approved by the TAC Chair/TAC. New Initiatives within a Working Group must be approved by the Working Group Steering Committee.<br /><br /> To propose a new WG or WG Initiative, just send an email to  <a href="mailto:enquiries@corecollective.dev">enquiries@corecollective.dev</a> and include the following:
    <ul>
      <li>A candidate to Chair/lead the new WG/Initiative efforts from a member company. This person will be required to help define the WG/Initiative and lead member outreach.</li>
      <li>Provide an outline of the WG/Initiative's technical scope including the problem it solves for the ecosystem and a brief summary of the envisioned technical solution.</li>
      <li>Provide a list of recommended WG/Initiative member companies that would benefit from the technical effort.</li>
    </ul>
    The enquiries response team, composed of inidividuals such as the TAC Chair and Community Director, will assure that the proposal is routed to the correct technical leadership teams for consideration.
  category: "Working Group FAQs"

- question: "How does CoreCollective work?"
  answer: >
    <p>The two primary purposes of CoreCollective is to host
       <a href="/working-groups/">Working Groups</a> and to run engineering Initiatives.
    </p>
    <p>Working Groups are technical discussion forums on topics relevant to the
    Arm ecosystem.  Each working group is chaired by a CoreCollective member,
    with the support of a community manager supplied by the project.
    Members of CoreCollective may join any active working group.
    </p>
    <p>Initiatives are engineering projects within a Working Group which are
    funded by CoreCollective members via sponsorship.
    It provides a way for multiple CoreCollective members to drive work on a shared need.
    The scope, priorities and approach of an initiative is set by the members who sponsor it.
    Management of the initiative is provided by CoreCollective on behalf of the sponsoring members.
    </p>
  category: "CoreCollective General FAQs"

- question: "How is CoreCollective organized?"
  answer: >
    CoreCollective is organized into three primary groups; the Governing Board, the Technical
    Advisory Committee, and the Working Groups.
    The Governing Board sets the overall direction of CoreCollective,
    and is responsible for the governance policies and overall budget.
    The Technical Advisory Committee (TAC) is a forum for technical discussions that span
    multiple interest areas, and is responsible for oversight of the Working Groups.
    It is the TAC which approves new Working Groups and who evaluates the state of each active
    group on a regular basis.
  category: "CoreCollective General FAQs"

- question: "Who runs CoreCollective?"
  answer: >
    CoreCollective is a project of Linaro Limited, a UK based limited by guarantee company,
    with the backing of Arm Limited.
    Linaro operates the project on behalf of the Arm ecosystem according to the terms of the
    <a href="/charter/">CoreCollective Charter</a>,
    and is accountable to the <a href="/about/">CoreCollective Governing Board</a>.
  category: "CoreCollective General FAQs"
